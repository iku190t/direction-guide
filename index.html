<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="方向ガイド">
  <meta name="theme-color" content="#10151b">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
  <title>方向ガイド</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10151b;
      --panel: #171e25;
      --line: #34424f;
      --text: #f8fafc;
      --muted: #aeb8c3;
      --red: #e94545;
      --yellow: #ffd44d;
      --ok: #3ddc97;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
    }

    main {
      width: min(680px, 100%);
      margin: 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 10px max(14px, env(safe-area-inset-bottom));
      display: grid;
      gap: 9px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 850;
    }

    .companyLink {
      color: #7f8993;
      font-size: 12px;
      font-weight: 500;
      text-align: right;
      text-decoration: none;
      white-space: nowrap;
    }

    .companyLink:active {
      color: #b8c0c8;
    }

    .guide {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px;
      text-align: center;
    }

    .guideMain {
      font-size: clamp(50px, 17vw, 90px);
      line-height: 1;
      font-weight: 950;
      color: var(--yellow);
      font-variant-numeric: tabular-nums;
    }

    .guideSub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 15px;
      font-variant-numeric: tabular-nums;
    }

    .compassBox {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111820;
      padding: 10px;
      display: grid;
      justify-items: center;
      gap: 7px;
    }

    .compass {
      position: relative;
      width: min(92vw, 430px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 3px solid #435260;
      background: #0f151c;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      transform-origin: center;
    }

    .tick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 9%;
      background: #8e9baa;
      transform-origin: 50% 50%;
    }

    .tick.major {
      width: 4px;
      height: 12%;
      background: #e7edf3;
    }

    .tick.zero {
      width: 6px;
      height: 15%;
      background: var(--red);
    }

    .relLabel {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 54px;
      height: 24px;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      transform-origin: center;
      pointer-events: none;
    }

    .relLabel {
      color: #e9eef4;
      font-size: 14px;
    }

    .topMark {
      position: absolute;
      left: 50%;
      top: 4px;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 26px solid var(--text);
      z-index: 8;
    }

    .targetNeedle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 43%;
      margin-left: -4px;
      margin-top: -43%;
      border-radius: 999px;
      background: var(--yellow);
      transform-origin: 50% 100%;
      z-index: 6;
      box-shadow: 0 0 18px rgba(255, 212, 77, .42);
    }

    .targetNeedle::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -17px;
      transform: translateX(-50%);
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-bottom: 24px solid var(--yellow);
    }

    .center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 38%;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #151d25;
      border: 2px solid #465562;
      z-index: 7;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 8px;
    }

    .center .angle {
      font-size: clamp(31px, 10vw, 48px);
      line-height: 1;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .center .caption {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      line-height: 1.35;
    }

    .controls {
      display: grid;
      gap: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button, input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-weight: 850;
    }

    button {
      min-height: 50px;
      font-size: 17px;
      transition: transform .12s ease, background-color .12s ease, border-color .12s ease;
    }

    button:active { transform: scale(.96); }

    button.primary {
      background: #3b3011;
      border-color: #8d7021;
    }

    button.ok {
      background: #143526;
      border-color: #287c54;
    }

    button.active {
      background: #4a1717;
      border-color: #b33a3a;
    }

    button.confirmed {
      background: #175d3c;
      border-color: #55d99a;
      transform: scale(.97);
    }

    .cameraOverlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      background: #000;
      color: var(--text);
    }

    .cameraOverlay.show {
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .cameraView {
      position: relative;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }

    .cameraView video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform-origin: center;
      will-change: transform;
    }

    .sightLine {
      position: absolute;
      left: 50%;
      top: 5%;
      bottom: 5%;
      width: 3px;
      transform: translateX(-50%);
      background: var(--yellow);
      box-shadow: 0 0 0 1px rgba(0,0,0,.65), 0 0 18px rgba(255,212,77,.7);
    }

    .sightLine::before {
      content: "";
      position: absolute;
      left: 50%;
      width: 54px;
      height: 3px;
      transform: translateX(-50%);
      background: var(--yellow);
      box-shadow: 0 0 0 1px rgba(0,0,0,.65);
    }

    .sightLine::before { top: 50%; }

    .cameraTop {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      padding: max(12px, env(safe-area-inset-top)) 12px 8px;
      background: linear-gradient(rgba(0,0,0,.72), rgba(0,0,0,0));
      font-weight: 850;
      text-align: center;
      text-shadow: 0 1px 3px #000;
    }

    .cameraReadouts {
      position: absolute;
      right: 10px;
      top: calc(max(58px, env(safe-area-inset-top) + 46px));
      display: grid;
      justify-items: end;
      gap: 6px;
      text-align: right;
      z-index: 3;
    }

    .cameraAngle,
    .cameraVertical {
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, .62);
      border: 1px solid rgba(255,255,255,.25);
      font-size: 21px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      text-shadow: 0 1px 3px #000;
    }

    .cameraControls {
      padding: 10px 10px max(12px, env(safe-area-inset-bottom));
      display: grid;
      gap: 8px;
      background: #0e1115;
    }

    .cameraControls .row {
      grid-template-columns: 1fr 1fr;
    }

    .heightPanel {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 5;
      display: none;
      gap: 9px;
      padding: 12px;
      border: 1px solid #596673;
      border-radius: 8px;
      background: rgba(14, 17, 21, .94);
      box-shadow: 0 4px 18px rgba(0,0,0,.45);
    }

    .heightPanel.show { display: grid; }

    .heightPrompt {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.4;
    }

    .heightPrompt.realtimeHeight {
      color: var(--yellow);
      font-size: 34px;
      font-weight: 950;
      line-height: 1.15;
      text-align: center;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 3px #000;
    }

    .heightDistanceRow {
      position: relative;
    }

    .heightDistanceRow input {
      padding-right: 36px;
      text-align: right;
    }

    .heightDistanceRow::after {
      content: "m";
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 17px;
      font-weight: 850;
      pointer-events: none;
    }

    .heightValue {
      color: var(--yellow);
      font-size: 34px;
      font-weight: 950;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .heightActions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    input {
      min-height: 44px;
      padding: 8px 10px;
      font-size: 20px;
      font-variant-numeric: tabular-nums;
    }

    .degreeInput {
      position: relative;
    }

    .degreeInput input {
      padding-right: 36px;
      text-align: right;
    }

    .degreeInput::after {
      content: "°";
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text);
      font-size: 20px;
      font-weight: 850;
      pointer-events: none;
    }

    @media (max-width: 430px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <h1>方向ガイド</h1>
      <span id="status" hidden>起動中</span>
      <a class="companyLink" href="https://ez-survey.sakura.ne.jp/" target="_blank" rel="noopener noreferrer">株式会社アイズ測量</a>
    </div>

    <section class="guide">
      <div id="guideMain" class="guideMain">---</div>
      <div id="guideSub" class="guideSub">機械方向を0°にセットしてください</div>
    </section>

    <section class="compassBox">
      <div id="compass" class="compass">
        <div id="ring" class="ring"></div>
        <div class="topMark"></div>
        <div id="targetNeedle" class="targetNeedle"></div>
        <div class="center">
          <div>
            <div id="centerAngle" class="angle">---°</div>
            <div class="caption">現在</div>
          </div>
        </div>
      </div>
      <div class="hint">黄色線をタップ/なぞって目標方向へ合わせます。周りの数字は機械方向を0°にした相対角度です。</div>
    </section>

    <section class="controls">
      <button id="compassBtn">コンパス</button>
      <button id="cameraBtn">カメラで合わせる</button>
      <button id="zeroBtn" class="primary">今の方向を0°にする</button>
      <div class="row">
        <button id="voiceBtn">音声: OFF</button>
        <label>読み上げ開始角度（この誤差以上）
          <span class="degreeInput">
            <input id="thresholdInput" type="number" min="1" max="90" step="1" inputmode="numeric" value="2">
          </span>
        </label>
      </div>
    </section>
  </main>

  <div id="cameraOverlay" class="cameraOverlay">
    <div id="cameraView" class="cameraView">
      <video id="cameraVideo" playsinline muted></video>
      <div class="cameraTop">中央線を目標物に合わせてください</div>
      <div class="cameraReadouts">
        <div id="cameraAngle" class="cameraAngle">0°基準から ---°</div>
        <div id="cameraVertical" class="cameraVertical">鉛直角 ---°</div>
      </div>
      <div class="sightLine"></div>
      <div id="heightPanel" class="heightPanel">
        <div id="heightPrompt" class="heightPrompt">目標物までの水平距離を入力してください</div>
        <div id="heightDistanceRow" class="heightDistanceRow">
          <input id="heightDistance" type="number" min="0.1" step="0.1" inputmode="decimal" placeholder="例 25.5">
        </div>
        <div id="heightValue" class="heightValue" hidden></div>
        <div class="heightActions">
          <button id="heightActionBtn" class="primary">距離を決定</button>
          <button id="heightResetBtn">やり直し</button>
        </div>
        <button id="heightCancelBtn">中止</button>
      </div>
    </div>
    <div class="cameraControls">
      <button id="heightBtn">高さを測る</button>
      <button id="cameraZeroBtn" class="primary">この方向を0°</button>
      <div class="row">
        <button id="cameraTargetBtn">黄色線にセット</button>
        <button id="cameraCloseBtn">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const compass = $("compass");
    const ring = $("ring");
    const targetNeedle = $("targetNeedle");
    const statusEl = $("status");
    const guideMain = $("guideMain");
    const guideSub = $("guideSub");
    const centerAngle = $("centerAngle");
    const thresholdInput = $("thresholdInput");
    const voiceBtn = $("voiceBtn");
    const cameraOverlay = $("cameraOverlay");
    const cameraView = $("cameraView");
    const cameraVideo = $("cameraVideo");
    const cameraAngle = $("cameraAngle");
    const cameraVertical = $("cameraVertical");
    const heightPanel = $("heightPanel");
    const heightPrompt = $("heightPrompt");
    const heightDistanceRow = $("heightDistanceRow");
    const heightDistance = $("heightDistance");
    const heightValue = $("heightValue");
    const heightActionBtn = $("heightActionBtn");

    if (localStorage.getItem("directionGuideVersion") !== "6") {
      localStorage.setItem("zeroHeading", "0");
      localStorage.setItem("compassMode", "1");
      localStorage.setItem("voiceOn", "0");
      localStorage.setItem("directionGuideVersion", "6");
    }

    const state = {
      heading: null,
      rawHeading: null,
      zeroHeading: Number(localStorage.getItem("zeroHeading")) || 0,
      compassMode: localStorage.getItem("compassMode") !== "0",
      target: Number(localStorage.getItem("targetAngle")) || 300,
      threshold: Number(localStorage.getItem("voiceThreshold")) || 2,
      voice: localStorage.getItem("voiceOn") === "1",
      targetVisual: 300,
      lastTargetTick: null,
      lastSpeechAt: 0,
      lastSpeechKey: "",
      lastBeepAt: 0,
      audioContext: null,
      cameraStream: null,
      cameraZoom: 1,
      verticalAngle: null,
      heightStage: "distance",
      heightDistance: 0,
      heightBottomAngle: null,
      sensorStarted: false,
      sensorRequesting: false
    };

    thresholdInput.value = state.threshold;

    function norm(deg) {
      return ((deg % 360) + 360) % 360;
    }

    function signedDiff(target, current) {
      return ((target - current + 540) % 360) - 180;
    }

    function shortestVisual(prev, next) {
      return prev + signedDiff(next, norm(prev));
    }

    function roundDeg(deg) {
      return norm(Math.round(norm(deg)));
    }

    function readHeading(event) {
      if (typeof event.webkitCompassHeading === "number") return event.webkitCompassHeading;
      if (typeof event.alpha === "number") return norm(360 - event.alpha);
      return null;
    }

    function relativeHeading() {
      if (state.heading == null) return null;
      return norm(state.heading - state.zeroHeading);
    }

    function updateCameraAngle() {
      const rel = relativeHeading();
      cameraAngle.textContent = rel == null ? "0°基準から ---°" : `0°基準から ${roundDeg(rel)}°`;
      cameraVertical.textContent = state.verticalAngle == null
        ? "鉛直角 ---°"
        : `鉛直角 ${Math.round(180 - state.verticalAngle)}°`;
      updateRealtimeHeight();
    }

    function angleFromPoint(clientX, clientY) {
      const r = compass.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      return norm(Math.atan2(clientX - cx, cy - clientY) * 180 / Math.PI);
    }

    function speak(text, force = false) {
      if (!state.voice || !("speechSynthesis" in window)) return;
      const now = Date.now();
      if (!force && now - state.lastSpeechAt < 2600) return;
      if (!force && text === state.lastSpeechKey) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ja-JP";
      u.rate = 1.05;
      speechSynthesis.speak(u);
      state.lastSpeechAt = now;
      state.lastSpeechKey = text;
    }

    function unlockAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return Promise.resolve();
      if (!state.audioContext) state.audioContext = new AudioContext();
      if (state.audioContext.state === "suspended") return state.audioContext.resume();
      return Promise.resolve();
    }

    function beep(force = false) {
      if (!state.voice) return;
      unlockAudio();
      if (!state.audioContext) return;
      const now = Date.now();
      if (!force && now - state.lastBeepAt < 520) return;
      state.lastBeepAt = now;
      const ctx = state.audioContext;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = 1760;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.075);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.085);
    }

    function tickSound() {
      const ready = unlockAudio();
      if (!state.audioContext) return;
      const ctx = state.audioContext;
      ready.then(() => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "square";
        osc.frequency.value = 1900;
        gain.gain.setValueAtTime(0.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.16, ctx.currentTime + 0.004);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.045);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.052);
      });
    }

    function pressFeedback(button) {
      clearTimeout(button.pressTimer);
      button.classList.add("confirmed");
      tickSound();
      if (navigator.vibrate) navigator.vibrate(35);
      button.pressTimer = setTimeout(() => button.classList.remove("confirmed"), 220);
    }

    function stopSpeech() {
      if ("speechSynthesis" in window) speechSynthesis.cancel();
      state.lastSpeechAt = 0;
      state.lastSpeechKey = "";
    }

    function buildCompass() {
      for (let d = 0; d < 360; d += 10) {
        const rad = d * Math.PI / 180;
        const tick = document.createElement("div");
        tick.className = d === 0 ? "tick zero" : d % 30 === 0 ? "tick major" : "tick";
        tick.style.left = `${50 + Math.sin(rad) * 45}%`;
        tick.style.top = `${50 - Math.cos(rad) * 45}%`;
        tick.style.transform = `translate(-50%, -50%) rotate(${d}deg)`;
        ring.appendChild(tick);

        if (d % 30 === 0) {
          const label = document.createElement("div");
          label.className = "relLabel";
          label.textContent = d === 0 ? "N" : String(d);
          if (d === 0) label.style.color = "var(--red)";
          label.style.left = `${50 + Math.sin(rad) * 32}%`;
          label.style.top = `${50 - Math.cos(rad) * 32}%`;
          label.style.transform = "translate(-50%, -50%)";
          ring.appendChild(label);
        }
      }

    }

    function updateDisplay() {
      voiceBtn.textContent = `音声: ${state.voice ? "ON" : "OFF"}`;
      voiceBtn.classList.toggle("ok", state.voice);
      localStorage.setItem("voiceOn", state.voice ? "1" : "0");
      $("compassBtn").textContent = "コンパス";
      $("compassBtn").classList.toggle("active", state.compassMode);
      const zeroLabel = ring.querySelector(".relLabel");
      if (zeroLabel) zeroLabel.textContent = state.compassMode ? "N" : "0";

      const rel = relativeHeading();
      if (rel == null) {
        state.targetVisual = shortestVisual(state.targetVisual, state.target);
        targetNeedle.style.transform = `rotate(${state.targetVisual}deg)`;
        updateCameraAngle();
        return;
      }

      ring.style.transform = `rotate(${-rel}deg)`;
      state.targetVisual = shortestVisual(state.targetVisual, state.target - rel);
      targetNeedle.style.transform = `rotate(${state.targetVisual}deg)`;

      const cur = roundDeg(rel);
      centerAngle.textContent = `${cur}°`;
      updateCameraAngle();

      const diff = signedDiff(state.target, rel);
      const abs = Math.round(Math.abs(diff));
      const threshold = Math.max(1, Number(thresholdInput.value) || 2);

      if (abs < threshold) {
        guideMain.style.color = "var(--ok)";
        guideMain.textContent = "OK";
        guideSub.textContent = `現在 ${cur}° / 目標 ${roundDeg(state.target)}°`;
        beep();
      } else {
        const side = diff > 0 ? "右" : "左";
        guideMain.style.color = "var(--yellow)";
        guideMain.textContent = `${side} ${abs}°`;
        guideSub.textContent = `現在 ${cur}° / 目標 ${roundDeg(state.target)}°`;
        speak(`${side}${abs}度`);
      }
    }

    function onOrientation(event) {
      if (typeof event.beta === "number") {
        const vertical = Math.max(0, Math.min(180, event.beta));
        state.verticalAngle = state.verticalAngle == null
          ? vertical
          : state.verticalAngle * 0.72 + vertical * 0.28;
        updateCameraAngle();
      }
      const h = readHeading(event);
      if (h == null) {
        statusEl.textContent = "方位なし";
        guideMain.textContent = "方位なし";
        guideSub.textContent = "iPhoneのモーションと方位を許可してください";
        return;
      }
      state.rawHeading = h;
      if (state.heading == null) {
        state.heading = h;
      } else {
        const next = shortestVisual(state.heading, h);
        state.heading = state.heading * 0.72 + next * 0.28;
      }
      statusEl.textContent = "動作中";
      updateDisplay();
    }

    async function startSensors() {
      if (state.sensorStarted || state.sensorRequesting) return;
      state.sensorRequesting = true;
      try {
        if (!window.isSecureContext) {
          statusEl.textContent = "HTTPS必要";
          guideMain.textContent = "HTTPS";
          guideSub.textContent = "iPhoneではHTTPSで開いてください";
          state.sensorRequesting = false;
          return;
        }
        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
          const res = await DeviceOrientationEvent.requestPermission();
          if (res !== "granted") {
            statusEl.textContent = "許可待ち";
            state.sensorRequesting = false;
            return;
          }
        }
        window.addEventListener("deviceorientation", onOrientation, true);
        window.addEventListener("deviceorientationabsolute", onOrientation, true);
        state.sensorStarted = true;
        state.sensorRequesting = false;
        statusEl.textContent = "待機中";
      } catch (err) {
        statusEl.textContent = "許可待ち";
        state.sensorRequesting = false;
      }
    }

    function setTargetFromEvent(event) {
      unlockAudio();
      const rel = relativeHeading() || 0;
      state.target = norm(angleFromPoint(event.clientX, event.clientY) + rel);
      const tick = roundDeg(state.target);
      if (state.lastTargetTick !== tick) {
        state.lastTargetTick = tick;
        tickSound();
      }
      localStorage.setItem("targetAngle", String(state.target));
      stopSpeech();
      updateDisplay();
    }

    async function openCamera() {
      unlockAudio();
      await startSensors();
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          guideMain.textContent = "カメラ不可";
          guideSub.textContent = "このブラウザーではカメラが使えません";
          return;
        }
        if (state.cameraStream) stopCamera();
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
        state.cameraStream = stream;
        cameraVideo.srcObject = stream;
        state.cameraZoom = 1;
        cameraVideo.style.transform = "scale(1)";
        await cameraVideo.play();
        updateCameraAngle();
        cameraOverlay.classList.add("show");
      } catch (err) {
        guideMain.textContent = "カメラ不可";
        guideSub.textContent = "カメラの許可が必要です";
      }
    }

    function stopCamera() {
      if (state.cameraStream) {
        for (const track of state.cameraStream.getTracks()) track.stop();
      }
      state.cameraStream = null;
      cameraVideo.srcObject = null;
      state.cameraZoom = 1;
      cameraVideo.style.transform = "scale(1)";
      closeHeightMeasurement();
      cameraOverlay.classList.remove("show");
    }

    function currentVerticalReading() {
      return state.verticalAngle == null ? null : 180 - state.verticalAngle;
    }

    function calculateHeight(topAngle) {
      if (state.heightBottomAngle == null || !Number.isFinite(state.heightDistance)) return null;
      const toRadians = Math.PI / 180;
      const bottomElevation = (90 - state.heightBottomAngle) * toRadians;
      const topElevation = (90 - topAngle) * toRadians;
      const height = Math.abs(
        state.heightDistance * (Math.tan(topElevation) - Math.tan(bottomElevation))
      );
      return Number.isFinite(height) ? height : null;
    }

    // 下点を記録した後は、iPhoneを動かすたびに現在の照準位置までの高さを更新する。
    function updateRealtimeHeight() {
      if (state.heightStage !== "top") return;
      const vertical = currentVerticalReading();
      const height = vertical == null ? null : calculateHeight(vertical);
      heightPrompt.classList.add("realtimeHeight");
      heightPrompt.textContent = height == null ? "高さ ---m" : `高さ ${height.toFixed(2)}m`;
    }

    function resetHeightMeasurement() {
      state.heightStage = "distance";
      state.heightDistance = 0;
      state.heightBottomAngle = null;
      heightPrompt.classList.remove("realtimeHeight");
      heightPrompt.textContent = "目標物までの水平距離を入力してください";
      heightDistance.value = "";
      heightDistanceRow.hidden = false;
      heightValue.hidden = true;
      heightValue.textContent = "";
      heightActionBtn.textContent = "距離を決定";
    }

    function openHeightMeasurement() {
      pressFeedback($("heightBtn"));
      resetHeightMeasurement();
      heightPanel.classList.add("show");
      setTimeout(() => heightDistance.focus(), 50);
    }

    function closeHeightMeasurement() {
      heightPanel.classList.remove("show");
      if (document.activeElement === heightDistance) heightDistance.blur();
    }

    function advanceHeightMeasurement() {
      pressFeedback(heightActionBtn);
      if (state.heightStage === "distance") {
        const distance = Number(heightDistance.value);
        if (!Number.isFinite(distance) || distance <= 0) {
          heightPrompt.textContent = "0より大きい水平距離を入力してください";
          heightDistance.focus();
          return;
        }
        state.heightDistance = distance;
        state.heightStage = "bottom";
        heightDistance.blur();
        heightDistanceRow.hidden = true;
        heightPrompt.textContent = "中央線を目標物の一番下に合わせてください";
        heightActionBtn.textContent = "下点を測定";
        return;
      }

      const vertical = currentVerticalReading();
      if (vertical == null) {
        heightPrompt.textContent = "鉛直角を取得できません。端末の方向アクセスを許可してください";
        startSensors();
        return;
      }

      if (state.heightStage === "bottom") {
        state.heightBottomAngle = vertical;
        state.heightStage = "top";
        updateRealtimeHeight();
        heightActionBtn.textContent = "上点を測定";
        return;
      }

      if (state.heightStage === "top") {
        const height = calculateHeight(vertical);
        state.heightStage = "result";
        heightPrompt.classList.remove("realtimeHeight");
        heightPrompt.textContent = `水平距離 ${state.heightDistance}m / 下点 ${Math.round(state.heightBottomAngle)}° / 上点 ${Math.round(vertical)}°`;
        heightValue.textContent = height == null ? "測定できません" : `高さ ${height.toFixed(2)}m`;
        heightValue.hidden = false;
        heightActionBtn.textContent = "もう一度";
        return;
      }

      resetHeightMeasurement();
      heightDistance.focus();
    }

    function confirmCameraAction(button, message) {
      const original = button.dataset.originalText || button.textContent;
      button.dataset.originalText = original;
      clearTimeout(button.confirmTimer);
      button.textContent = message;
      button.classList.add("confirmed");
      if (navigator.vibrate) navigator.vibrate(45);
      button.confirmTimer = setTimeout(() => {
        button.textContent = original;
        button.classList.remove("confirmed");
      }, 750);
    }

    function setZeroFromCamera() {
      unlockAudio();
      if (state.heading == null) {
        guideMain.textContent = "方位待ち";
        guideSub.textContent = "方位が取れてから押してください";
        startSensors();
        return;
      }
      state.zeroHeading = state.heading;
      state.compassMode = false;
      localStorage.setItem("zeroHeading", String(state.zeroHeading));
      localStorage.setItem("compassMode", "0");
      stopSpeech();
      speak("この方向をゼロ度にしました", true);
      updateDisplay();
      confirmCameraAction($("cameraZeroBtn"), "0°に設定しました");
    }

    function setTargetFromCamera() {
      unlockAudio();
      const rel = relativeHeading();
      if (rel == null) {
        guideMain.textContent = "方位待ち";
        guideSub.textContent = "方位が取れてから押してください";
        startSensors();
        return;
      }
      state.target = rel;
      localStorage.setItem("targetAngle", String(state.target));
      stopSpeech();
      updateDisplay();
      confirmCameraAction($("cameraTargetBtn"), "セットしました");
    }

    const cameraPointers = new Map();
    let pinchStartDistance = 0;
    let pinchStartZoom = 1;

    function pointerDistance() {
      const points = [...cameraPointers.values()];
      return Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
    }

    cameraView.addEventListener("pointerdown", (event) => {
      cameraView.setPointerCapture(event.pointerId);
      cameraPointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (cameraPointers.size === 2) {
        pinchStartDistance = pointerDistance();
        pinchStartZoom = state.cameraZoom;
      }
    });

    cameraView.addEventListener("pointermove", (event) => {
      if (!cameraPointers.has(event.pointerId)) return;
      cameraPointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (cameraPointers.size !== 2 || !pinchStartDistance) return;
      state.cameraZoom = Math.min(5, Math.max(1, pinchStartZoom * pointerDistance() / pinchStartDistance));
      cameraVideo.style.transform = `scale(${state.cameraZoom})`;
    });

    function releaseCameraPointer(event) {
      cameraPointers.delete(event.pointerId);
      if (cameraPointers.size < 2) pinchStartDistance = 0;
    }

    cameraView.addEventListener("pointerup", releaseCameraPointer);
    cameraView.addEventListener("pointercancel", releaseCameraPointer);

    let compassPointerId = null;

    compass.addEventListener("pointerdown", (event) => {
      compassPointerId = event.pointerId;
      compass.setPointerCapture(event.pointerId);
      setTargetFromEvent(event);
    });

    compass.addEventListener("pointermove", (event) => {
      if (event.pointerId === compassPointerId) setTargetFromEvent(event);
    });

    function releaseCompassPointer(event) {
      if (event.pointerId === compassPointerId) compassPointerId = null;
    }

    compass.addEventListener("pointerup", releaseCompassPointer);
    compass.addEventListener("pointercancel", releaseCompassPointer);

    $("compassBtn").addEventListener("click", () => {
      unlockAudio();
      stopSpeech();
      if (state.compassMode) {
        if (state.heading == null) {
          guideMain.textContent = "方位待ち";
          guideSub.textContent = "方位が取れてから押してください";
          startSensors();
          return;
        }
        state.zeroHeading = state.heading;
        state.compassMode = false;
        localStorage.setItem("zeroHeading", String(state.zeroHeading));
        localStorage.setItem("compassMode", "0");
      } else {
        state.zeroHeading = 0;
        state.compassMode = true;
        localStorage.setItem("zeroHeading", "0");
        localStorage.setItem("compassMode", "1");
      }
      updateDisplay();
    });

    $("cameraBtn").addEventListener("click", () => {
      pressFeedback($("cameraBtn"));
      openCamera();
    });
    $("cameraCloseBtn").addEventListener("click", stopCamera);
    $("cameraZeroBtn").addEventListener("click", setZeroFromCamera);
    $("cameraTargetBtn").addEventListener("click", setTargetFromCamera);
    $("heightBtn").addEventListener("click", openHeightMeasurement);
    heightActionBtn.addEventListener("click", advanceHeightMeasurement);
    $("heightResetBtn").addEventListener("click", resetHeightMeasurement);
    $("heightCancelBtn").addEventListener("click", closeHeightMeasurement);
    window.addEventListener("pagehide", stopCamera);

    $("zeroBtn").addEventListener("click", () => {
      unlockAudio();
      if (state.heading == null) {
        guideMain.textContent = "方位待ち";
        guideSub.textContent = "方位が取れてから押してください";
        startSensors();
        return;
      }
      state.zeroHeading = state.heading;
      state.compassMode = false;
      localStorage.setItem("zeroHeading", String(state.zeroHeading));
      localStorage.setItem("compassMode", "0");
      stopSpeech();
      speak("今の方向をゼロ度にしました", true);
      updateDisplay();
    });

    voiceBtn.addEventListener("click", () => {
      unlockAudio();
      state.voice = !state.voice;
      if (!state.voice) stopSpeech();
      updateDisplay();
    });

    thresholdInput.addEventListener("change", () => {
      state.threshold = Math.max(1, Number(thresholdInput.value) || 2);
      localStorage.setItem("voiceThreshold", String(state.threshold));
      stopSpeech();
      updateDisplay();
    });

    buildCompass();
    updateDisplay();
    startSensors();
    document.addEventListener("pointerdown", () => startSensors(), { once: true, capture: true });
    document.addEventListener("touchstart", () => startSensors(), { once: true, capture: true });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
