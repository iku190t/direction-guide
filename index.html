<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="方向ガイド">
  <meta name="theme-color" content="#10151b">
  <title>方向ガイド</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10151b;
      --panel: #171e25;
      --line: #34424f;
      --text: #f8fafc;
      --muted: #aeb8c3;
      --red: #e94545;
      --yellow: #ffd44d;
      --ok: #3ddc97;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
    }

    main {
      width: min(680px, 100%);
      margin: 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 10px max(14px, env(safe-area-inset-bottom));
      display: grid;
      gap: 9px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 850;
    }

    .status {
      min-width: 82px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #121820;
      font-size: 13px;
      text-align: center;
    }

    .guide {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px;
      text-align: center;
    }

    .guideMain {
      font-size: clamp(50px, 17vw, 90px);
      line-height: 1;
      font-weight: 950;
      color: var(--yellow);
      font-variant-numeric: tabular-nums;
    }

    .guideSub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 15px;
      font-variant-numeric: tabular-nums;
    }

    .compassBox {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111820;
      padding: 10px;
      display: grid;
      justify-items: center;
      gap: 7px;
    }

    .compass {
      position: relative;
      width: min(92vw, 430px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 3px solid #435260;
      background: #0f151c;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      transform-origin: center;
    }

    .tick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 9%;
      background: #8e9baa;
      transform-origin: 50% 50%;
    }

    .tick.major {
      width: 4px;
      height: 12%;
      background: #e7edf3;
    }

    .tick.zero {
      width: 6px;
      height: 15%;
      background: var(--red);
    }

    .relLabel {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 54px;
      height: 24px;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      transform-origin: center;
      pointer-events: none;
    }

    .relLabel {
      color: #e9eef4;
      font-size: 14px;
    }

    .topMark {
      position: absolute;
      left: 50%;
      top: 4px;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-top: 26px solid var(--text);
      z-index: 8;
    }

    .targetNeedle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 43%;
      margin-left: -4px;
      margin-top: -43%;
      border-radius: 999px;
      background: var(--yellow);
      transform-origin: 50% 100%;
      z-index: 6;
      box-shadow: 0 0 18px rgba(255, 212, 77, .42);
    }

    .targetNeedle::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -17px;
      transform: translateX(-50%);
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-bottom: 24px solid var(--yellow);
    }

    .center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 38%;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #151d25;
      border: 2px solid #465562;
      z-index: 7;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 8px;
    }

    .center .angle {
      font-size: clamp(31px, 10vw, 48px);
      line-height: 1;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .center .caption {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      line-height: 1.35;
    }

    .controls {
      display: grid;
      gap: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button, input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-weight: 850;
    }

    button {
      min-height: 50px;
      font-size: 17px;
    }

    button.primary {
      background: #3b3011;
      border-color: #8d7021;
    }

    button.ok {
      background: #143526;
      border-color: #287c54;
    }

    button.active {
      background: #4a1717;
      border-color: #b33a3a;
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    input {
      min-height: 44px;
      padding: 8px 10px;
      font-size: 20px;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 430px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <h1>方向ガイド</h1>
      <div id="status" class="status">起動中</div>
    </div>

    <section class="guide">
      <div id="guideMain" class="guideMain">---</div>
      <div id="guideSub" class="guideSub">機械方向を0°にセットしてください</div>
    </section>

    <section class="compassBox">
      <div id="compass" class="compass">
        <div id="ring" class="ring"></div>
        <div class="topMark"></div>
        <div id="targetNeedle" class="targetNeedle"></div>
        <div class="center">
          <div>
            <div id="centerAngle" class="angle">---°</div>
            <div class="caption">現在</div>
          </div>
        </div>
      </div>
      <div class="hint">黄色線をタップ/なぞって目標方向へ合わせます。周りの数字は機械方向を0°にした相対角度です。</div>
    </section>

    <section class="controls">
      <button id="compassBtn">コンパス</button>
      <button id="zeroBtn" class="primary">今の方向を0°にする</button>
      <div class="row">
        <button id="voiceBtn" class="ok">音声: ON</button>
        <label>読み上げ開始角度（この誤差以上）
          <input id="thresholdInput" type="number" min="1" max="90" step="1" inputmode="numeric" value="2">
        </label>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const compass = $("compass");
    const ring = $("ring");
    const targetNeedle = $("targetNeedle");
    const statusEl = $("status");
    const guideMain = $("guideMain");
    const guideSub = $("guideSub");
    const centerAngle = $("centerAngle");
    const thresholdInput = $("thresholdInput");
    const voiceBtn = $("voiceBtn");

    if (localStorage.getItem("directionGuideVersion") !== "5") {
      localStorage.setItem("zeroHeading", "0");
      localStorage.setItem("compassMode", "1");
      localStorage.setItem("directionGuideVersion", "5");
    }

    const state = {
      heading: null,
      rawHeading: null,
      zeroHeading: Number(localStorage.getItem("zeroHeading")) || 0,
      compassMode: localStorage.getItem("compassMode") !== "0",
      target: Number(localStorage.getItem("targetAngle")) || 300,
      threshold: Number(localStorage.getItem("voiceThreshold")) || 2,
      voice: localStorage.getItem("voiceOn") !== "0",
      targetVisual: 300,
      lastTargetTick: null,
      lastSpeechAt: 0,
      lastSpeechKey: "",
      lastBeepAt: 0,
      audioContext: null,
      sensorStarted: false,
      sensorRequesting: false
    };

    thresholdInput.value = state.threshold;

    function norm(deg) {
      return ((deg % 360) + 360) % 360;
    }

    function signedDiff(target, current) {
      return ((target - current + 540) % 360) - 180;
    }

    function shortestVisual(prev, next) {
      return prev + signedDiff(next, norm(prev));
    }

    function roundDeg(deg) {
      return norm(Math.round(norm(deg)));
    }

    function readHeading(event) {
      if (typeof event.webkitCompassHeading === "number") return event.webkitCompassHeading;
      if (typeof event.alpha === "number") return norm(360 - event.alpha);
      return null;
    }

    function relativeHeading() {
      if (state.heading == null) return null;
      return norm(state.heading - state.zeroHeading);
    }

    function angleFromPoint(clientX, clientY) {
      const r = compass.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      return norm(Math.atan2(clientX - cx, cy - clientY) * 180 / Math.PI);
    }

    function speak(text, force = false) {
      if (!state.voice || !("speechSynthesis" in window)) return;
      const now = Date.now();
      if (!force && now - state.lastSpeechAt < 2600) return;
      if (!force && text === state.lastSpeechKey) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ja-JP";
      u.rate = 1.05;
      speechSynthesis.speak(u);
      state.lastSpeechAt = now;
      state.lastSpeechKey = text;
    }

    function unlockAudio() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      if (!state.audioContext) state.audioContext = new AudioContext();
      if (state.audioContext.state === "suspended") state.audioContext.resume();
    }

    function beep(force = false) {
      if (!state.voice) return;
      unlockAudio();
      if (!state.audioContext) return;
      const now = Date.now();
      if (!force && now - state.lastBeepAt < 520) return;
      state.lastBeepAt = now;
      const ctx = state.audioContext;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = 1760;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.075);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.085);
    }

    function tickSound() {
      unlockAudio();
      if (!state.audioContext) return;
      const ctx = state.audioContext;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "square";
      osc.frequency.value = 2600;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.08, ctx.currentTime + 0.004);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.028);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.032);
    }

    function stopSpeech() {
      if ("speechSynthesis" in window) speechSynthesis.cancel();
      state.lastSpeechAt = 0;
      state.lastSpeechKey = "";
    }

    function buildCompass() {
      for (let d = 0; d < 360; d += 10) {
        const rad = d * Math.PI / 180;
        const tick = document.createElement("div");
        tick.className = d === 0 ? "tick zero" : d % 30 === 0 ? "tick major" : "tick";
        tick.style.left = `${50 + Math.sin(rad) * 45}%`;
        tick.style.top = `${50 - Math.cos(rad) * 45}%`;
        tick.style.transform = `translate(-50%, -50%) rotate(${d}deg)`;
        ring.appendChild(tick);

        if (d % 30 === 0) {
          const label = document.createElement("div");
          label.className = "relLabel";
          label.textContent = d === 0 ? "N" : String(d);
          if (d === 0) label.style.color = "var(--red)";
          label.style.left = `${50 + Math.sin(rad) * 32}%`;
          label.style.top = `${50 - Math.cos(rad) * 32}%`;
          label.style.transform = "translate(-50%, -50%)";
          ring.appendChild(label);
        }
      }

    }

    function updateDisplay() {
      voiceBtn.textContent = `音声: ${state.voice ? "ON" : "OFF"}`;
      localStorage.setItem("voiceOn", state.voice ? "1" : "0");
      $("compassBtn").textContent = "コンパス";
      $("compassBtn").classList.toggle("active", state.compassMode);
      const zeroLabel = ring.querySelector(".relLabel");
      if (zeroLabel) zeroLabel.textContent = state.compassMode ? "N" : "0";

      const rel = relativeHeading();
      if (rel == null) {
        state.targetVisual = shortestVisual(state.targetVisual, state.target);
        targetNeedle.style.transform = `rotate(${state.targetVisual}deg)`;
        return;
      }

      ring.style.transform = `rotate(${-rel}deg)`;
      state.targetVisual = shortestVisual(state.targetVisual, state.target - rel);
      targetNeedle.style.transform = `rotate(${state.targetVisual}deg)`;

      const cur = roundDeg(rel);
      centerAngle.textContent = `${cur}°`;

      const diff = signedDiff(state.target, rel);
      const abs = Math.round(Math.abs(diff));
      const threshold = Math.max(1, Number(thresholdInput.value) || 2);

      if (abs < threshold) {
        guideMain.style.color = "var(--ok)";
        guideMain.textContent = "OK";
        guideSub.textContent = `現在 ${cur}° / 目標 ${roundDeg(state.target)}°`;
        beep();
      } else {
        const side = diff > 0 ? "右" : "左";
        guideMain.style.color = "var(--yellow)";
        guideMain.textContent = `${side} ${abs}°`;
        guideSub.textContent = `現在 ${cur}° / 目標 ${roundDeg(state.target)}°`;
        speak(`${side}${abs}度`);
      }
    }

    function onOrientation(event) {
      const h = readHeading(event);
      if (h == null) {
        statusEl.textContent = "方位なし";
        guideMain.textContent = "方位なし";
        guideSub.textContent = "iPhoneのモーションと方位を許可してください";
        return;
      }
      state.rawHeading = h;
      if (state.heading == null) {
        state.heading = h;
      } else {
        const next = shortestVisual(state.heading, h);
        state.heading = state.heading * 0.72 + next * 0.28;
      }
      statusEl.textContent = "動作中";
      updateDisplay();
    }

    async function startSensors() {
      if (state.sensorStarted || state.sensorRequesting) return;
      state.sensorRequesting = true;
      try {
        if (!window.isSecureContext) {
          statusEl.textContent = "HTTPS必要";
          guideMain.textContent = "HTTPS";
          guideSub.textContent = "iPhoneではHTTPSで開いてください";
          state.sensorRequesting = false;
          return;
        }
        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
          const res = await DeviceOrientationEvent.requestPermission();
          if (res !== "granted") {
            statusEl.textContent = "許可待ち";
            state.sensorRequesting = false;
            return;
          }
        }
        window.addEventListener("deviceorientation", onOrientation, true);
        window.addEventListener("deviceorientationabsolute", onOrientation, true);
        state.sensorStarted = true;
        state.sensorRequesting = false;
        statusEl.textContent = "待機中";
      } catch (err) {
        statusEl.textContent = "許可待ち";
        state.sensorRequesting = false;
      }
    }

    function setTargetFromEvent(event) {
      unlockAudio();
      const rel = relativeHeading() || 0;
      state.target = norm(angleFromPoint(event.clientX, event.clientY) + rel);
      const tick = Math.floor(roundDeg(state.target) / 2);
      if (state.lastTargetTick !== tick) {
        state.lastTargetTick = tick;
        tickSound();
      }
      localStorage.setItem("targetAngle", String(state.target));
      stopSpeech();
      updateDisplay();
    }

    compass.addEventListener("pointerdown", (event) => {
      compass.setPointerCapture(event.pointerId);
      setTargetFromEvent(event);
    });

    compass.addEventListener("pointermove", (event) => {
      if (event.buttons) setTargetFromEvent(event);
    });

    $("compassBtn").addEventListener("click", () => {
      unlockAudio();
      stopSpeech();
      if (state.compassMode) {
        if (state.heading == null) {
          guideMain.textContent = "方位待ち";
          guideSub.textContent = "方位が取れてから押してください";
          startSensors();
          return;
        }
        state.zeroHeading = state.heading;
        state.compassMode = false;
        localStorage.setItem("zeroHeading", String(state.zeroHeading));
        localStorage.setItem("compassMode", "0");
      } else {
        state.zeroHeading = 0;
        state.compassMode = true;
        localStorage.setItem("zeroHeading", "0");
        localStorage.setItem("compassMode", "1");
      }
      updateDisplay();
    });

    $("zeroBtn").addEventListener("click", () => {
      unlockAudio();
      if (state.heading == null) {
        guideMain.textContent = "方位待ち";
        guideSub.textContent = "方位が取れてから押してください";
        startSensors();
        return;
      }
      state.zeroHeading = state.heading;
      state.compassMode = false;
      localStorage.setItem("zeroHeading", String(state.zeroHeading));
      localStorage.setItem("compassMode", "0");
      stopSpeech();
      speak("今の方向をゼロ度にしました", true);
      updateDisplay();
    });

    voiceBtn.addEventListener("click", () => {
      unlockAudio();
      state.voice = !state.voice;
      if (!state.voice) stopSpeech();
      updateDisplay();
    });

    thresholdInput.addEventListener("change", () => {
      state.threshold = Math.max(1, Number(thresholdInput.value) || 2);
      localStorage.setItem("voiceThreshold", String(state.threshold));
      stopSpeech();
      updateDisplay();
    });

    buildCompass();
    updateDisplay();
    startSensors();
    document.addEventListener("pointerdown", () => startSensors(), { once: true, capture: true });
    document.addEventListener("touchstart", () => startSensors(), { once: true, capture: true });
  </script>
</body>
</html>
