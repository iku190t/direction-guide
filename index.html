<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="方向ガイド">
  <meta name="theme-color" content="#0f1419">
  <title>方向ガイド</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1419;
      --panel: #171e25;
      --line: #33404c;
      --text: #f7fafc;
      --muted: #aeb8c3;
      --red: #e64b4b;
      --green: #35d08a;
      --yellow: #ffd34f;
      --blue: #62a8ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
    }

    main {
      width: min(680px, 100%);
      margin: 0 auto;
      padding: max(12px, env(safe-area-inset-top)) 12px max(16px, env(safe-area-inset-bottom));
      display: grid;
      gap: 10px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 800;
    }

    .status {
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #11171d;
      font-size: 13px;
      min-width: 86px;
      text-align: center;
    }

    .bigGuide {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px;
      text-align: center;
    }

    .bigGuide .mainText {
      font-size: clamp(48px, 16vw, 84px);
      line-height: 1;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .bigGuide .subText {
      margin-top: 6px;
      color: var(--muted);
      font-size: 15px;
      font-variant-numeric: tabular-nums;
    }

    .compassBox {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #11171d;
      padding: 10px;
      display: grid;
      justify-items: center;
      gap: 8px;
    }

    .compass {
      position: relative;
      width: min(92vw, 430px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: #10171e;
      border: 3px solid #42505e;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      transform-origin: center;
    }

    .tick {
      position: absolute;
      width: 2px;
      height: 10%;
      margin-left: -1px;
      background: #93a0ad;
      transform-origin: 50% 50%;
    }

    .tick.major {
      width: 4px;
      height: 13%;
      margin-left: -2px;
      background: #e7edf3;
    }

    .tick.north {
      background: var(--red);
      height: 16%;
      width: 6px;
      margin-left: -3px;
    }

    .label {
      position: absolute;
      width: 48px;
      height: 24px;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 18px;
      color: #f4f8fb;
      font-variant-numeric: tabular-nums;
    }

    .label.north { color: var(--red); font-size: 24px; }

    .outerHint {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      line-height: 1.35;
    }

    .topIndex {
      position: absolute;
      left: 50%;
      top: 5px;
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 24px solid var(--text);
      transform: translateX(-50%);
      z-index: 10;
    }

    .currentNeedle, .targetNeedle, .selectNeedle {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-origin: 50% 100%;
      border-radius: 999px;
      z-index: 6;
    }

    .currentNeedle {
      width: 8px;
      height: 39%;
      margin-left: -4px;
      margin-top: -39%;
      background: var(--green);
      box-shadow: 0 0 18px rgba(53,208,138,.45);
    }

    .currentNeedle::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -16px;
      transform: translateX(-50%);
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-bottom: 22px solid var(--green);
    }

    .targetNeedle {
      width: 6px;
      height: 45%;
      margin-left: -3px;
      margin-top: -45%;
      background: var(--yellow);
      z-index: 5;
    }

    .targetNeedle::before, .selectNeedle::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -12px;
      transform: translateX(-50%);
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-bottom: 19px solid currentColor;
    }

    .selectNeedle {
      width: 4px;
      height: 48%;
      margin-left: -2px;
      margin-top: -48%;
      background: var(--blue);
      color: var(--blue);
      z-index: 4;
      opacity: .9;
    }

    .center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 38%;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #151d24;
      border: 2px solid #465462;
      z-index: 7;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 8px;
    }

    .center .angle {
      font-size: clamp(28px, 10vw, 44px);
      line-height: 1;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .center .cap {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 9px;
      min-height: 70px;
    }

    .panel .k {
      color: var(--muted);
      font-size: 12px;
    }

    .panel .v {
      margin-top: 4px;
      font-size: 26px;
      line-height: 1;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: grid;
      gap: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    button, input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 17px;
      font-weight: 800;
    }

    button.primary {
      background: #123627;
      border-color: #28764f;
    }

    button.yellow {
      background: #3e3311;
      border-color: #82691f;
    }

    button.muted {
      color: var(--muted);
      font-weight: 700;
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    input {
      min-height: 44px;
      padding: 8px 10px;
      font-size: 20px;
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 430px) {
      main { padding-left: 8px; padding-right: 8px; gap: 8px; }
      .panels { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
      .panel { min-height: 58px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <h1>方向ガイド</h1>
      <div id="status" class="status">未開始</div>
    </div>

    <section class="bigGuide">
      <div id="guideMain" class="mainText">開始</div>
      <div id="guideSub" class="subText">センサー開始を押してください</div>
    </section>

    <section class="compassBox">
      <div id="compass" class="compass">
        <div id="ring" class="ring"></div>
        <div class="topIndex"></div>
        <div id="targetNeedle" class="targetNeedle"></div>
        <div id="selectNeedle" class="selectNeedle"></div>
        <div id="currentNeedle" class="currentNeedle"></div>
        <div class="center">
          <div>
            <div id="centerAngle" class="angle">---°</div>
            <div class="cap">現在方向</div>
          </div>
        </div>
      </div>
      <div class="outerHint">一本指: 青い仮目標を合わせる / 二本指: 目盛りを回して機械方向を0°に合わせる</div>
    </section>

    <section class="panels">
      <div class="panel">
        <div class="k">現在</div>
        <div id="currentValue" class="v">---°</div>
      </div>
      <div class="panel">
        <div class="k">仮目標</div>
        <div id="selectValue" class="v">300°</div>
      </div>
      <div class="panel">
        <div class="k">セット済み目標</div>
        <div id="targetValue" class="v">300°</div>
      </div>
    </section>

    <section class="controls">
      <button id="startBtn" class="primary">センサー開始</button>
      <div class="row">
        <button id="targetBtn" class="yellow">目標をセット</button>
        <button id="voiceBtn">音声: ON</button>
      </div>
      <div class="row">
        <button id="zeroBtn">今の向きを0°</button>
        <button id="stopVoiceBtn" class="muted">音声を止める</button>
      </div>
      <div class="row">
        <label>仮目標を数字で入力
          <input id="selectInput" type="number" min="0" max="359" step="1" inputmode="numeric" value="300">
        </label>
        <label>読み上げ開始
          <input id="thresholdInput" type="number" min="1" max="90" step="1" inputmode="numeric" value="2">
        </label>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const ring = $("ring");
    const compass = $("compass");
    const statusEl = $("status");
    const guideMain = $("guideMain");
    const guideSub = $("guideSub");
    const currentNeedle = $("currentNeedle");
    const targetNeedle = $("targetNeedle");
    const selectNeedle = $("selectNeedle");
    const currentValue = $("currentValue");
    const selectValue = $("selectValue");
    const targetValue = $("targetValue");
    const centerAngle = $("centerAngle");
    const selectInput = $("selectInput");
    const thresholdInput = $("thresholdInput");
    const voiceBtn = $("voiceBtn");

    const state = {
      started: false,
      rawHeading: null,
      heading: null,
      zeroHeading: Number(localStorage.getItem("zeroHeading")) || 0,
      bezelOffset: Number(localStorage.getItem("bezelOffset")) || 0,
      selected: Number(localStorage.getItem("selectedAngle")) || 300,
      target: Number(localStorage.getItem("targetAngle")) || 300,
      threshold: Number(localStorage.getItem("voiceThreshold")) || 2,
      voice: localStorage.getItem("voiceOn") !== "0",
      currentVisual: 0,
      targetVisual: 300,
      selectVisual: 300,
      lastSpeechAt: 0,
      lastSpeechKey: "",
      pointers: new Map(),
      gestureStartAngle: 0,
      gestureStartBezel: 0
    };

    selectInput.value = state.selected;
    thresholdInput.value = state.threshold;

    function norm(deg) {
      return ((deg % 360) + 360) % 360;
    }

    function signedDiff(target, current) {
      return ((target - current + 540) % 360) - 180;
    }

    function shortestVisual(prev, next) {
      return prev + signedDiff(next, norm(prev));
    }

    function roundDeg(deg) {
      return Math.round(norm(deg));
    }

    function angleFromPoint(clientX, clientY) {
      const rect = compass.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      return norm(Math.atan2(clientX - cx, cy - clientY) * 180 / Math.PI);
    }

    function twoFingerAngle() {
      const pts = [...state.pointers.values()];
      const a = pts[0];
      const b = pts[1];
      return Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
    }

    function speak(text, force = false) {
      if (!state.voice || !("speechSynthesis" in window)) return;
      const now = Date.now();
      if (!force && now - state.lastSpeechAt < 2600) return;
      if (!force && text === state.lastSpeechKey) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ja-JP";
      u.rate = 1.05;
      speechSynthesis.speak(u);
      state.lastSpeechAt = now;
      state.lastSpeechKey = text;
    }

    function stopSpeech() {
      if ("speechSynthesis" in window) speechSynthesis.cancel();
      state.lastSpeechKey = "";
      state.lastSpeechAt = 0;
    }

    function buildRing() {
      for (let d = 0; d < 360; d += 10) {
        const rad = d * Math.PI / 180;
        const tick = document.createElement("div");
        tick.className = d === 0 ? "tick north" : d % 30 === 0 ? "tick major" : "tick";
        tick.style.left = `${50 + Math.sin(rad) * 45}%`;
        tick.style.top = `${50 - Math.cos(rad) * 45}%`;
        tick.style.transform = `translate(-50%, -50%) rotate(${d}deg)`;
        ring.appendChild(tick);
      }

      const labels = [
        [0, "N", "north"], [90, "E", ""], [180, "S", ""], [270, "W", ""],
        [30, "30", ""], [60, "60", ""], [120, "120", ""], [150, "150", ""],
        [210, "210", ""], [240, "240", ""], [300, "300", ""], [330, "330", ""]
      ];

      for (const [d, text, extra] of labels) {
        const rad = d * Math.PI / 180;
        const el = document.createElement("div");
        el.className = `label ${extra}`;
        el.textContent = text;
        el.style.left = `${50 + Math.sin(rad) * 36}%`;
        el.style.top = `${50 - Math.cos(rad) * 36}%`;
        el.style.transform = "translate(-50%, -50%)";
        ring.appendChild(el);
      }
    }

    function readHeading(event) {
      if (typeof event.webkitCompassHeading === "number") return event.webkitCompassHeading;
      if (typeof event.alpha === "number") return norm(360 - event.alpha);
      return null;
    }

    function relativeHeading() {
      if (state.heading == null) return null;
      return norm(state.heading - state.zeroHeading - state.bezelOffset);
    }

    function updateDisplay() {
      voiceBtn.textContent = `音声: ${state.voice ? "ON" : "OFF"}`;
      localStorage.setItem("voiceOn", state.voice ? "1" : "0");

      ring.style.transform = `rotate(${state.bezelOffset}deg)`;

      state.targetVisual = shortestVisual(state.targetVisual, state.target);
      state.selectVisual = shortestVisual(state.selectVisual, state.selected);
      targetNeedle.style.transform = `rotate(${state.targetVisual}deg)`;
      selectNeedle.style.transform = `rotate(${state.selectVisual}deg)`;

      selectValue.textContent = `${roundDeg(state.selected)}°`;
      targetValue.textContent = `${roundDeg(state.target)}°`;
      selectInput.value = roundDeg(state.selected);

      const rel = relativeHeading();
      if (rel == null) return;

      state.currentVisual = shortestVisual(state.currentVisual, rel);
      currentNeedle.style.transform = `rotate(${state.currentVisual}deg)`;

      const cur = roundDeg(rel);
      currentValue.textContent = `${cur}°`;
      centerAngle.textContent = `${cur}°`;

      const diff = signedDiff(state.target, rel);
      const abs = Math.round(Math.abs(diff));
      const threshold = Math.max(1, Number(thresholdInput.value) || 2);

      if (abs < threshold) {
        guideMain.style.color = "var(--green)";
        guideMain.textContent = "OK";
        guideSub.textContent = `現在 ${cur}° / 目標 ${roundDeg(state.target)}°`;
        speak("合っています");
      } else {
        const side = diff > 0 ? "右" : "左";
        guideMain.style.color = "var(--yellow)";
        guideMain.textContent = `${side} ${abs}°`;
        guideSub.textContent = `現在 ${cur}° / 目標 ${roundDeg(state.target)}°`;
        speak(`${side}${abs}度`);
      }
    }

    function onOrientation(event) {
      const h = readHeading(event);
      if (h == null) {
        statusEl.textContent = "方位なし";
        guideMain.textContent = "方位なし";
        guideSub.textContent = "iPhoneの設定でモーションと方位を許可してください";
        return;
      }
      state.rawHeading = h;
      if (state.heading == null) {
        state.heading = h;
      } else {
        const next = shortestVisual(state.heading, h);
        state.heading = state.heading * 0.72 + next * 0.28;
      }
      statusEl.textContent = "動作中";
      updateDisplay();
    }

    async function startSensors() {
      try {
        if (!window.isSecureContext) {
          statusEl.textContent = "HTTPS必要";
          guideMain.textContent = "HTTPS";
          guideSub.textContent = "iPhoneではHTTPSページで開いてください";
          return;
        }
        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
          const res = await DeviceOrientationEvent.requestPermission();
          if (res !== "granted") {
            statusEl.textContent = "許可なし";
            guideMain.textContent = "許可なし";
            guideSub.textContent = "モーションと方位の許可が必要です";
            return;
          }
        }
        window.addEventListener("deviceorientation", onOrientation, true);
        window.addEventListener("deviceorientationabsolute", onOrientation, true);
        state.started = true;
        statusEl.textContent = "待機中";
        speak("センサーを開始しました", true);
      } catch (err) {
        statusEl.textContent = "エラー";
        guideMain.textContent = "開始失敗";
        guideSub.textContent = err.message || String(err);
      }
    }

    compass.addEventListener("pointerdown", (event) => {
      compass.setPointerCapture(event.pointerId);
      state.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (state.pointers.size === 2) {
        state.gestureStartAngle = twoFingerAngle();
        state.gestureStartBezel = state.bezelOffset;
      } else if (state.pointers.size === 1) {
        state.selected = angleFromPoint(event.clientX, event.clientY);
        localStorage.setItem("selectedAngle", String(state.selected));
        updateDisplay();
      }
    });

    compass.addEventListener("pointermove", (event) => {
      if (!state.pointers.has(event.pointerId)) return;
      state.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
      if (state.pointers.size >= 2) {
        const delta = twoFingerAngle() - state.gestureStartAngle;
        state.bezelOffset = norm(state.gestureStartBezel + delta);
        localStorage.setItem("bezelOffset", String(state.bezelOffset));
      } else {
        state.selected = angleFromPoint(event.clientX, event.clientY);
        localStorage.setItem("selectedAngle", String(state.selected));
      }
      updateDisplay();
    });

    function endPointer(event) {
      state.pointers.delete(event.pointerId);
      if (state.pointers.size === 1) {
        const only = [...state.pointers.values()][0];
        state.selected = angleFromPoint(only.x, only.y);
      }
      updateDisplay();
    }

    compass.addEventListener("pointerup", endPointer);
    compass.addEventListener("pointercancel", endPointer);

    $("startBtn").addEventListener("click", startSensors);

    $("zeroBtn").addEventListener("click", () => {
      if (state.heading == null) {
        guideMain.textContent = "方位待ち";
        guideSub.textContent = "センサー開始後に押してください";
        return;
      }
      state.zeroHeading = state.heading;
      state.bezelOffset = 0;
      localStorage.setItem("zeroHeading", String(state.zeroHeading));
      localStorage.setItem("bezelOffset", String(state.bezelOffset));
      stopSpeech();
      speak("今の向きをゼロ度にしました", true);
      updateDisplay();
    });

    $("targetBtn").addEventListener("click", () => {
      state.target = norm(state.selected);
      localStorage.setItem("targetAngle", String(state.target));
      stopSpeech();
      speak(`目標${roundDeg(state.target)}度にセットしました`, true);
      updateDisplay();
    });

    voiceBtn.addEventListener("click", () => {
      state.voice = !state.voice;
      if (!state.voice) stopSpeech();
      updateDisplay();
    });

    $("stopVoiceBtn").addEventListener("click", () => {
      state.voice = false;
      stopSpeech();
      updateDisplay();
    });

    selectInput.addEventListener("change", () => {
      state.selected = norm(Number(selectInput.value) || 0);
      localStorage.setItem("selectedAngle", String(state.selected));
      updateDisplay();
    });

    thresholdInput.addEventListener("change", () => {
      state.threshold = Math.max(1, Number(thresholdInput.value) || 2);
      localStorage.setItem("voiceThreshold", String(state.threshold));
      stopSpeech();
      updateDisplay();
    });

    buildRing();
    updateDisplay();
  </script>
</body>
</html>
